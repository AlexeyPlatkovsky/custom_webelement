name: Pull requests runs
on:
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - run: echo "The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "The name of the branch is ${{ github.ref }}"
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: temurin

      - name: Run chmod to make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Record test start time
        run: echo "TEST_START=$(date +%s)" >> $GITHUB_ENV

      - name: Run tests
        run: |
          ./gradlew clean test -Dos=unix -Dchrome.binary="${{ steps.setup-chrome.outputs.chrome-path }}"

      - name: Check for non-passing tests and post PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import glob, sys, os, json, time
          from xml.etree import ElementTree as ET
          import urllib.request

          # Parse results
          failed = skipped = total = 0
          for f in glob.glob('build/test-results/**/*.xml', recursive=True):
              root = ET.parse(f).getroot()
              suites = [root] if root.tag == 'testsuite' else root.findall('testsuite')
              for ts in suites:
                  failed  += int(ts.get('failures', 0)) + int(ts.get('errors', 0))
                  skipped += int(ts.get('skipped', 0))
                  total   += int(ts.get('tests', 0))

          passed = total - failed - skipped

          # Calculate execution time
          start = int(os.environ.get('TEST_START', 0))
          duration = int(time.time()) - start if start else 0
          mins, secs = divmod(duration, 60)
          duration_str = f"{mins}m {secs}s" if mins else f"{secs}s"

          # Build comment
          if failed == 0 and skipped == 0 and total > 0:
              status_icon = "✅"
              status_text = "All tests passed"
          else:
              status_icon = "❌"
              parts = []
              if failed:  parts.append(f"{failed} failed")
              if skipped: parts.append(f"{skipped} skipped")
              if total == 0: parts.append("no tests found")
              status_text = "Tests " + " and ".join(parts)

          table = "\n".join([
              "| Status | Count |",
              "|--------|-------|",
              f"| \u2705 Passed  | {passed} |",
              f"| \u274c Failed  | {failed} |",
              f"| \u23ed\ufe0f Skipped | {skipped} |",
              f"| **Total**  | **{total}** |",
          ])
          body = (
              f"{status_icon} **Test results** \u2014 `{duration_str}`\n\n"
              + table
              + f"\n\n> {status_text} in {duration_str}"
          )

          # Post comment
          pr = os.environ['PR_NUMBER']
          repo = os.environ['REPO']
          token = os.environ['GH_TOKEN']
          url = f"https://api.github.com/repos/{repo}/issues/{pr}/comments"
          data = json.dumps({"body": body}).encode()
          req = urllib.request.Request(url, data=data, headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "Content-Type": "application/json",
          })
          urllib.request.urlopen(req)

          # Fail build if needed
          if failed > 0 or skipped > 0 or total == 0:
              print(f"ERROR: {failed} failed, {skipped} skipped — all tests must pass.")
              sys.exit(1)
          EOF

      - name: Publish TestNG Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: testng-reports
          path: build/reports/tests/testng
